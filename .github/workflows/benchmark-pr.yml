name: Benchmark PR

on:
  pull_request:
    paths:
      - 'src/**'
      - 'app/**'
      - 'tests/**'
      - 'benchmarks/**'
      - 'examples/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - '.github/workflows/benchmark-pr.yml'

permissions:
  contents: read

concurrency:
  group: benchmark-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring
          tools: composer
          coverage: none

      - name: Capture refs
        id: refs
        run: |
          echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Check out base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.refs.outputs.base_sha }}
          fetch-depth: 1

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.5-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php8.5-composer-

      - name: Install base dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Benchmark base branch
        run: php bin/phpeg benchmark --iterations=3 --scale=medium --mode=default >/dev/null

      - name: Check out PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ steps.refs.outputs.head_sha }}
          fetch-depth: 1
          clean: false

      - name: Install PR dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Benchmark PR head
        run: php bin/phpeg benchmark --iterations=3 --scale=medium --mode=default >/dev/null

      - name: Compare benchmark runs
        id: compare
        run: |
          php bin/phpeg benchmark:compare | tee benchmark-report.txt

      - name: Write job summary
        run: |
          {
            echo "## Benchmark PR"
            echo ""
            echo "- Base: \`${{ steps.refs.outputs.base_sha }}\`"
            echo "- Head: \`${{ steps.refs.outputs.head_sha }}\`"
            echo ""
            echo '```text'
            cat benchmark-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write benchmark metadata
        run: |
          {
            echo "BASE_SHA=${{ steps.refs.outputs.base_sha }}"
            echo "HEAD_SHA=${{ steps.refs.outputs.head_sha }}"
          } > benchmark-metadata.env

      - name: Upload benchmark report
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-pr-report
          path: |
            benchmark-report.txt
            benchmark-metadata.env
          retention-days: 7

  comment:
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      issues: write

    steps:
      - name: Download benchmark report
        uses: actions/download-artifact@v5
        with:
          name: benchmark-pr-report

      - name: Comment on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- phpeg-benchmark-report -->';
            const metadata = Object.fromEntries(
              fs.readFileSync('benchmark-metadata.env', 'utf8')
                .trim()
                .split('\n')
                .map((line) => line.split('=', 2))
            );
            const report = fs.readFileSync('benchmark-report.txt', 'utf8').trimEnd();
            const body = [
              marker,
              '',
              '## Benchmark PR',
              '',
              `- Base: \`${metadata.BASE_SHA}\``,
              `- Head: \`${metadata.HEAD_SHA}\``,
              '',
              '```text',
              report,
              '```',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
